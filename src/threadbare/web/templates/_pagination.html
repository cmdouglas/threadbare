{# Expects: page (current, 1-indexed), total_pages, page_url (callable int -> str) #}
<nav class="pagination">
  <span class="pagination-label">Page</span>
  {% for p in pagination.page_window(page, total_pages) %}
    {% if p is none %}
      <span class="pagination-ellipsis">&hellip;</span>
    {% elif p == page %}
      <span class="pagination-current">{{ p }}</span>
    {% else %}
      <a class="pagination-page" href="{{ page_url(p) }}">{{ p }}</a>
    {% endif %}
  {% endfor %}
</nav>
